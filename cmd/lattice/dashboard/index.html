<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>lattice</title>
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<header>
  <div class="hbar">
    <a class="brand" href="/" title="library">lattice</a>
    <span class="count" id="count"></span>
    <span class="spacer"></span>
    <label class="search" for="q">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
      <input id="q" type="search" placeholder="Search" autocomplete="off" spellcheck="false">
      <kbd>/</kbd>
    </label>
  </div>
</header>

<main>
  <div class="status" id="eyebrow" hidden></div>
  <div id="list" role="list"></div>
  <div id="empty" class="empty" hidden>
    No summaries yet.
    <code>lattice add &lt;file.html&gt;</code>
  </div>
</main>

<section id="reader" hidden>
  <div class="bar">
    <div class="bar-inner">
      <button id="back" type="button" title="Back to library">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18 9 12l6-6"/></svg>
        Library
      </button>
      <div class="reader-id">
        <span id="r-title"></span>
        <span id="r-source" class="muted"></span>
      </div>
      <span class="spacer"></span>
      <div class="share-wrap">
        <button id="r-share" type="button" title="Share this summary at a public URL" aria-expanded="false">
          Share
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="10.5" x2="15.4" y2="6.5"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/></svg>
        </button>
        <div id="share-pop" class="share-pop" hidden></div>
      </div>
      <a id="r-raw" target="_blank" rel="noopener" title="Original file, no injected code">
        Raw
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 17 17 7"/><polyline points="9 7 17 7 17 15"/></svg>
      </a>
      <a id="r-dl" title="Download original">
        Download
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
      </a>
    </div>
  </div>
  <iframe id="frame" title="summary"></iframe>
</section>

<script src="/assets/app.js"></script>
</body>
</html>
