# Copy this file to wrangler.toml and replace the resource names and IDs with
# values from your own Cloudflare account. wrangler.toml is intentionally
# ignored because it identifies production infrastructure.

name = "lattice-share"
main = "src/index.ts"
compatibility_date = "2024-11-01"

rules = [
  { type = "Text", globs = ["**/*.txt"], fallthrough = true },
]

[vars]
SHARE_DOMAIN = ""
PUBLIC_BASE = "https://share.example.com"
MAX_SNAPSHOT_BYTES = "2097152"
DEFAULT_MAX_SHARES = "10"

[[r2_buckets]]
binding = "SNAPSHOTS"
bucket_name = "lattice-snapshots"

[[d1_databases]]
binding = "DB"
database_name = "lattice"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[[routes]]
pattern = "api.example.com"
custom_domain = true

[[routes]]
pattern = "share.example.com"
custom_domain = true
