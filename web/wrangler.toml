# Static Astro landing page for lattice.pub.
# Deploy: pnpm build && pnpm run deploy  (or `make web-deploy` from repo root)

name = "lattice-web"
compatibility_date = "2026-07-16"

[assets]
directory = "./dist"
not_found_handling = "404-page"

# Custom domains — wrangler provisions DNS + TLS on deploy.
[[routes]]
pattern = "lattice.pub"
custom_domain = true

[[routes]]
pattern = "www.lattice.pub"
custom_domain = true

# This exact route takes precedence over lattice-share's *.lattice.pub/* route.
[[routes]]
pattern = "www.lattice.pub/*"
zone_name = "lattice.pub"
